name: Auto Release – angular-froala-wysiwyg
 
on:
  pull_request:
    types: [closed]
    branches:
      - master
 
permissions:
  contents: write
 
jobs:
  check:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
    steps:
      - name: Check merge commit for release intent
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.payload.pull_request.merge_commit_sha
            });
            const msg = commit.message || '';
            const isRelease = /release:\s*yes/i.test(msg);
            core.info(`Merge commit message:\n${msg}`);
            core.info(`Release intent: ${isRelease}`);
            core.setOutput('release', isRelease ? 'true' : 'false');

  release:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    environment: PAT
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
 

      - name: Read version from ./projects/library/package.json
        run: |
          VERSION=$(jq -r '.version' ./projects/library/package.json)
      
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to determine version from ./projects/library/package.json"
            exit 1
          fi
      
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
      
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Releasing version $VERSION"
  
 
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          RELEASE_NOTES: ${{ github.event.pull_request.body }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists. Skipping."
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "Release ${VERSION}" \
            --notes "$RELEASE_NOTES" \
            --latest
